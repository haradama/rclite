[tools]
python = "3.14"
uv = "0.11"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks.install]
description = "Sync the project's virtualenv against pyproject.toml"
run = "uv sync"

[tasks.test]
description = "Run the test suite"
run = "uv run python -m pytest tests"

[tasks.bench]
description = "Run host benchmarks"
run = "uv run python benchmarks/compare_host_full.py"

[tasks.docs]
description = "Build pdoc documentation into docs/"
run = '''
uv sync --extra docs
PKGS=$(find rclite -name "__init__.py" -exec dirname {} \; | sed "s|/|.|g" | sort)
uv run pdoc $PKGS -o docs
'''

# --- Reproducible native toolchain (flake.nix devShell) -------------------
# These run the same commands as above, but inside `nix develop` so llc /
# mlir-opt / qemu / simavr / avr-gcc come from the pinned LLVM-20 + cross
# layer instead of whatever happens to be on PATH (which today resolves llc
# to ~/opt/circt and breaks the thumbv6m/thumbv4t/wasm32 cross-compile tests).
# Requires Nix with flakes enabled. The plain `test`/`bench` tasks above are
# left untouched so contributors without Nix keep working as before.

# `-f` enables flakes inline, so these work even if nix.conf doesn't set
# experimental-features = nix-command flakes (the host currently does not).
[tasks.dev]
description = "Enter the pinned native-toolchain devShell (nix develop)"
run = "nix --extra-experimental-features 'nix-command flakes' develop"

[tasks.test-repro]
description = "Run the full test suite inside the nix devShell (incl. MLIR/cross tests)"
run = "nix --extra-experimental-features 'nix-command flakes' develop -c uv run python -m pytest tests"

[tasks.bench-repro]
description = "Run host benchmarks inside the nix devShell"
run = "nix --extra-experimental-features 'nix-command flakes' develop -c uv run python benchmarks/compare_host_full.py"

# --- Pre-commit: fast, staged-files-only quality gate ---------------------
# Checks ONLY the Python files staged for this commit (the repo isn't fully
# ruff-formatted yet, so a whole-repo check would block every commit). Runs
# ruff format --check + unused-import/redefinition lint. `uvx` fetches ruff
# ephemerally — no project dependency. Fix failures with `mise run fmt`.
[tasks.pre-commit]
description = "Fast pre-commit checks (ruff format + unused imports) on staged files"
run = '''
files=$(git diff --cached --name-only --diff-filter=ACM -- '*.py')
if [ -z "$files" ]; then echo "pre-commit: no staged Python files"; exit 0; fi
rc=0
uvx ruff format --check -- $files || rc=1
uvx ruff check --select F401,F811 -- $files || rc=1
if [ $rc -ne 0 ]; then
  echo ""
  echo "pre-commit failed. Auto-fix with:  mise run fmt   (then re-stage)"
fi
exit $rc
'''

[tasks.fmt]
description = "Auto-format + fix unused imports on staged Python files (ruff)"
run = '''
files=$(git diff --cached --name-only --diff-filter=ACM -- '*.py')
if [ -z "$files" ]; then echo "fmt: no staged Python files"; exit 0; fi
uvx ruff format -- $files
uvx ruff check --select F401,F811 --fix -- $files
echo ""
echo "Formatted. Re-stage the changes:  git add $files"
'''

[tasks.setup-hooks]
description = "Activate the tracked git hooks (.githooks/) for this clone"
run = "git config core.hooksPath .githooks && echo 'git hooks -> .githooks (pre-commit active)'"

# --- Local GitHub Actions via act (manual; needs Docker) ------------------
# Runs the real CI workflow in a container. Heavy (minutes); intentionally NOT
# in pre-commit. Requires Docker access (add yourself to the docker group:
# `sudo usermod -aG docker $USER && newgrp docker`).
[tasks.ci-local]
description = "Run the GitHub Actions CI workflow locally with act (needs Docker)"
run = '''
command -v act >/dev/null 2>&1 || { echo "act not found (brew install act)"; exit 1; }
docker info >/dev/null 2>&1 || { echo "Docker not accessible. Run: sudo usermod -aG docker \$USER && newgrp docker"; exit 1; }
act push -W .github/workflows/python-package.yml
'''
