<!DOCTYPE html>
<!-- rclite browser demo -- generated by rclite.targets.wasm.BrowserWasm.
     Serve this directory over HTTP (WebAssembly.instantiateStreaming needs a
     real server, not file://):  python -m http.server  then open this page. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>rclite in the browser (@@DTYPE@@)</title>
  <style>
    body { font: 14px/1.5 system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.3rem; }
    code, pre { background: #f4f4f4; border-radius: 4px; padding: .1rem .3rem; }
    pre { padding: .8rem; overflow-x: auto; }
    .muted { color: #666; }
    button { padding: .4rem .8rem; font-size: 1rem; cursor: pointer; }
    table { border-collapse: collapse; margin-top: 1rem; }
    td, th { border: 1px solid #ddd; padding: .3rem .6rem; text-align: right; }
  </style>
</head>
<body>
  <h1>rclite &middot; Reservoir Computing in WebAssembly</h1>
  <p class="muted">
    Model: <code>@@DTYPE@@</code> &middot; K=@@K@@ inputs &middot; M=@@M@@ outputs &middot;
    module <code>@@WASM_NAME@@</code> (@@WASM_SIZE@@ bytes, imports: <code>@@IMPORTS@@</code>).
  </p>
  <p>
    <button id="run">Run @@T@@-step inference</button>
    <span id="status" class="muted"></span>
  </p>
  <table id="out" hidden>
    <thead><tr><th>step</th><th>input[0]</th><th>output[0]</th></tr></thead>
    <tbody></tbody>
  </table>
  <pre id="raw" hidden></pre>

  <script type="module">
    import { loadRclite } from "./@@LOADER_NAME@@";

    // A short demo input sequence baked in at build time (T*K floats, raw).
    const DEMO_INPUT = [@@DEMO_INPUT@@];

    const status = document.getElementById("status");
    document.getElementById("run").addEventListener("click", async () => {
      status.textContent = "loading…";
      const rc = await loadRclite("./@@WASM_NAME@@");
      const y = rc.predict(DEMO_INPUT);
      const T = y.length / @@M@@;
      const tbody = document.querySelector("#out tbody");
      tbody.innerHTML = "";
      for (let t = 0; t < T; t++) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${t}</td><td>${DEMO_INPUT[t * @@K@@].toFixed(4)}</td>` +
                       `<td>${y[t * @@M@@].toFixed(4)}</td>`;
        tbody.appendChild(tr);
      }
      document.getElementById("out").hidden = false;
      const raw = document.getElementById("raw");
      raw.hidden = false;
      raw.textContent = "predict() -> [" +
        Array.from(y).map((v) => v.toFixed(4)).join(", ") + "]";
      status.textContent = "done.";
    });
  </script>
</body>
</html>
